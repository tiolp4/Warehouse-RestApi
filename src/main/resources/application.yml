server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: warehouse-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/warehouse}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:465678900}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: WarehouseApiPool
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: true
    show-sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-this-is-a-256-bit-development-secret-rotate-it}
    ttl-minutes: ${JWT_TTL_MIN:480}
  cors:
    allowed-origins: ${CORS_ORIGINS:*}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger
    operationsSorter: method
