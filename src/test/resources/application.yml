spring:
  datasource:
    url: jdbc:h2:mem:warehouse-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    show-sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: test-secret-must-be-at-least-32-bytes-long-1234567890
    ttl-minutes: 60
  cors:
    allowed-origins: "*"

server:
  servlet:
    context-path: /api
